services:
  app:
    container_name: app
    build: ./app
    ports:
      - "55173:55173"
    # On garde les volumes pour le dev, mais sans le :ro qui bloque pnpm/vite
    volumes:
      - ./app:/app
      - /app/node_modules
    restart: always
    depends_on:
      - api

  api:
    container_name: api
    build: ./api
    ports:
      - "33000:33000"
    env_file:
      - ./api/.env
    # En dev on peut vouloir nodemon, en prod le CMD du Dockerfile (node server.js)
    # Pour garder un seul fichier, on laisse la commande de dev ici ou on utilise des variables
    command: >
      sh -c "npx prisma migrate deploy && 
             npx prisma db seed && 
             pnpm run nodemon"
    volumes:
      - ./api:/api
      - /api/node_modules
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: db
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=vinyls_addict
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "55432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  # --- Services de DEV uniquement (Profiles) ---

  db_test:
    container_name: db_test
    image: postgres:17-alpine
    profiles: ["dev"]
    env_file:
      - .env.test
    ports:
      - "55433:5432"
    volumes:
      - db_test_data:/var/lib/postgresql/data
    restart: always

  prisma-studio:
    container_name: prisma-studio
    build: ./api 
    profiles: ["dev"]
    command: npx prisma studio --port 5555 --browser none
    environment:
      - POSTGRES_URL=postgresql://postgres:password@db:5432/vinyls_addict
    ports:
      - "55555:5555"
    volumes:
      - ./api:/api
    working_dir: /api
    restart: always
    depends_on:
      - db

volumes:
  db_data:
  db_test_data:
